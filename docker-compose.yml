version: '3.8'

services:
  # Kullanıcı Arayüzü / Çiftçi Kokpiti
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: seralogix-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - seralogix-network

networks:
  seralogix-network:
    driver: bridge
